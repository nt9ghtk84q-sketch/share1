<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照片墙（电脑接收端）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; font-family: Arial; }
    .flying-photo {
      position: fixed;
      object-fit: cover;
      border-radius: 10px;
      animation: fly 8s ease-in-out forwards;
      z-index: 10;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
    @keyframes fly {
      0% { opacity: 0; transform: scale(0.8) translateY(50px); }
      20% { opacity: 1; transform: scale(1) translateY(0); }
      80% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8) translateY(-50px); }
    }
    .title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="title">📺 照片墙（等待手机上传...）</div>

  <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
  <script>
    // 已配置好的 Pusher 信息（无需修改）
    const PUSHER_KEY = "8cefeeb240825fe33ba3";
    const PUSHER_CLUSTER = "ap3";
    const CHANNEL_NAME = "image-channel";

    // 初始化 Pusher
    const pusher = new Pusher(PUSHER_KEY, {
      cluster: PUSHER_CLUSTER,
      encrypted: true,
      debug: true,
      retryAttempts: 10,
      retryDelay: 2000
    });

    // 订阅频道，接收照片
    const channel = pusher.subscribe(CHANNEL_NAME);
    channel.bind("new-image", (data) => {
      console.log("📥 收到新照片：", data.url);
      playPhoto(data.url);
    });

    // 播放照片动画
    function playPhoto(url) {
      const img = new Image();
      img.src = url;
      img.className = "flying-photo";
      
      // 随机大小（150-300px）
      const size = Math.random() * 150 + 150;
      img.style.width = size + "px";
      img.style.height = size + "px";
      
      // 随机位置（避免超出屏幕）
      img.style.left = Math.random() * (window.innerWidth - size) + "px";
      img.style.top = Math.random() * (window.innerHeight - size) + "px";
      
      // 随机旋转（-15° 到 15°）
      img.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
      
      document.body.appendChild(img);
      
      // 8秒后移除
      setTimeout(() => {
        img.remove();
      }, 8000);
    }

    // 提示：确保页面一直打开
    console.log("✅ 电脑端已就绪，等待手机上传照片...");
  </script>
</body>
</html>
