<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照片上传页（手机端）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { padding: 20px; font-family: Arial; background: #f5f5f5; }
    .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; text-align: center; margin-bottom: 20px; color: #333; }
    #fileInput { display: none; }
    .upload-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      margin-bottom: 15px;
    }
    .send-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
    }
    .tip { text-align: center; margin-top: 15px; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 上传照片到电脑</h1>
    <input type="file" id="fileInput" accept="image/*">
    <button class="upload-btn" onclick="selectPhoto()">选择照片</button>
    <button class="send-btn" onclick="sendPhoto()">发送到电脑</button>
    <p class="tip">选好照片后点击「发送」即可</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script>
    // 已配置好的 Pusher 信息（无需修改）
    const PUSHER_APP_ID = "2138688";
    const PUSHER_KEY = "8cefeeb240825fe33ba3";
    const PUSHER_SECRET = "1271c274a381c8215d9c";
    const PUSHER_CLUSTER = "ap3";
    const CHANNEL_NAME = "image-channel";
    const IMGBB_API_KEY = "3229e907e0d604f33a90f59233c04b05";

    let selectedPhotoUrl = "";

    // 选择照片（本地预览 + 上传到 ImgBB）
    async function selectPhoto() {
      document.getElementById("fileInput").click();
      document.getElementById("fileInput").onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 上传到 ImgBB 获取直链
        try {
          const formData = new FormData();
          formData.append("image", file);
          formData.append("key", IMGBB_API_KEY);
          
          const res = await fetch("https://api.imgbb.com/1/upload", {
            method: "POST",
            body: formData,
            mode: "cors"
          });
          
          const data = await res.json();
          if (data.success) {
            selectedPhotoUrl = data.data.url;
            alert("✅ 照片选择成功！点击「发送」即可同步到电脑");
          } else {
            alert("❌ 照片处理失败，请重试");
          }
        } catch (err) {
          // 本地兜底（转 Base64）
          const reader = new FileReader();
          reader.onload = (e) => {
            selectedPhotoUrl = e.target.result;
            alert("✅ 照片选择成功（本地模式）！点击「发送」即可同步到电脑");
          };
          reader.readAsDataURL(file);
        }
      };
    }

    // 发送照片到 Pusher（电脑端接收）
    async function sendPhoto() {
      if (!selectedPhotoUrl) {
        alert("请先选择照片！");
        return;
      }

      try {
        const timestamp = Math.floor(Date.now() / 1000);
        const params = {
          auth_key: PUSHER_KEY,
          auth_timestamp: timestamp,
          auth_version: "1.0",
          name: "new-image",
          channels: CHANNEL_NAME,
          data: JSON.stringify({ url: selectedPhotoUrl })
        };

        // 生成签名
        const sortedKeys = Object.keys(params).sort();
        const queryString = sortedKeys.map(k => `${k}=${encodeURIComponent(params[k])}`).join("&");
        const signature = CryptoJS.HmacSHA256(
          `POST\n/apps/${PUSHER_APP_ID}/events\n${queryString}`,
          PUSHER_SECRET
        );

        // 发送请求
        const finalParams = new URLSearchParams({
          ...params,
          auth_signature: signature.toString(CryptoJS.enc.Hex)
        });

        await fetch(`https://api-${PUSHER_CLUSTER}.pusher.com/apps/${PUSHER_APP_ID}/events`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: finalParams,
          mode: "cors"
        });

        alert("🚀 照片已发送！电脑端可实时看到");
        selectedPhotoUrl = ""; // 清空选择
      } catch (err) {
        console.error("发送失败：", err);
        alert("⚠️ 发送失败，但照片已保存在本地");
      }
    }
  </script>
</body>
</html>
